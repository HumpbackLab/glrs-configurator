name: Build release packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build
        required: true
        type: string
      release_id:
        description: Existing GitHub Release ID
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} package
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            bundles: nsis
          - name: Linux
            platform: ubuntu-22.04
            bundles: deb

    runs-on: ${{ matrix.platform }}
    concurrency:
      group: release-${{ github.event.release.id || inputs.release_id }}-${{ matrix.platform }}
      cancel-in-progress: false

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Verify application version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node scripts/set-release-version.mjs "$RELEASE_TAG" --check

      - name: Build and attach package to the GitHub Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          releaseId: ${{ github.event.release.id || inputs.release_id }}
          tagName: ${{ github.event.release.tag_name || inputs.tag }}
          updaterJsonPreferNsis: true
          args: --bundles ${{ matrix.bundles }}

  sync-gitee:
    name: Sync release to Gitee
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Sync GitHub release and updater manifest to Gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPOSITORY: ${{ vars.GITEE_REPOSITORY || 'ncer/glrs-configurator' }}
        run: |
          ./scripts/sync-github-release-to-gitee.sh \
            "${{ github.repository }}" \
            "$GITEE_REPOSITORY" \
            "${{ github.event.release.tag_name || inputs.tag }}"
