name: Build release packages

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} package
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            bundles: nsis
          - name: Linux
            platform: ubuntu-22.04
            bundles: deb

    runs-on: ${{ matrix.platform }}
    concurrency:
      group: release-${{ github.event.release.id }}-${{ matrix.platform }}
      cancel-in-progress: false

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Set application version from release tag
        working-directory: app
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e "const fs = require('fs'); const version = process.env.RELEASE_TAG.replace(/^v/, ''); if (!/^\d+\.\d+\.\d+([+-][0-9A-Za-z.-]+)?$/.test(version)) throw new Error('Release tag must be vX.Y.Z or X.Y.Z'); fs.writeFileSync('src-tauri/tauri.release.conf.json', JSON.stringify({ version }));"

      - name: Build and attach package to the GitHub Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          updaterJsonPreferNsis: true
          args: --config src-tauri/tauri.release.conf.json --bundles ${{ matrix.bundles }}

  sync-gitee:
    name: Sync release to Gitee
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Sync GitHub release and updater manifest to Gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPOSITORY: ${{ vars.GITEE_REPOSITORY || 'ncer/glrs-configurator' }}
        run: |
          ./scripts/sync-github-release-to-gitee.sh \
            "${{ github.repository }}" \
            "$GITEE_REPOSITORY" \
            "${{ github.event.release.tag_name }}"
